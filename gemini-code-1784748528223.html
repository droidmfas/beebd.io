<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Personal Website</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      color: var(--text);
    }

    p.subtitle {
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 20px;
    }

    p.bio {
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      background-color: var(--accent);
      color: #0f172a;
      padding: 12px 24px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <main class="card">
    <h1>Hello, I'm Alex 👋</h1>
    <p class="subtitle">Web Developer & Creator</p>
    <p class="bio">
      Welcome to my personal site hosted on GitHub Pages! I love building cool web projects and learning new tech.
    </p>
    <a href="https://github.com" class="btn" target="_blank" rel="noopener">Check out my GitHub</a>
  </main>

</body>
</html>
